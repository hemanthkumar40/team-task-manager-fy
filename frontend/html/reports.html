<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - Team Task Manager</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- Navbar will be inserted by JS -->
    <nav class="navbar" id="navbar"></nav>

    <!-- Main Content -->
    <div class="container">
        <div class="page-header">
            <h1>Reports</h1>
            <p>View project and task statistics</p>
        </div>

        <!-- Overall Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalProjects">0</div>
                <div class="stat-label">Total Projects</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalTasks">0</div>
                <div class="stat-label">Total Tasks</div>
            </div>
            <div class="stat-card completed">
                <div class="stat-number" id="completedTasks">0</div>
                <div class="stat-label">Completed Tasks</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalMembers">0</div>
                <div class="stat-label">Team Members</div>
            </div>
        </div>

        <!-- Task Status Breakdown -->
        <div class="card">
            <div class="card-header">
                <h3>Task Status Breakdown</h3>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Status</th>
                            <th>Count</th>
                            <th>Percentage</th>
                        </tr>
                    </thead>
                    <tbody id="statusBreakdown">
                        <tr><td colspan="3" class="loading">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Member Performance -->
        <div class="card">
            <div class="card-header">
                <h3>Member Performance</h3>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Member</th>
                            <th>Assigned</th>
                            <th>Completed</th>
                            <th>In Progress</th>
                            <th>Pending Review</th>
                        </tr>
                    </thead>
                    <tbody id="memberPerformance">
                        <tr><td colspan="5" class="loading">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Recent Activity -->
        <div class="card">
            <div class="card-header">
                <h3>Recent Activity</h3>
            </div>
            <ul id="activityList" class="activity-list">
                <li class="loading">Loading...</li>
            </ul>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/reports.js"></script>
</body>
</html>
