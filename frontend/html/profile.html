<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Team Task Manager</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- Navbar will be inserted by JS -->
    <nav class="navbar" id="navbar"></nav>

    <!-- Main Content -->
    <div class="container">
        <div class="login-container" style="max-width: 600px;">
            <div class="card">
                <div class="card-header">
                    <h2>My Profile</h2>
                </div>

                <!-- Alert -->
                <div id="alertBox" class="alert" style="display: none;"></div>

                <div id="profileInfo">
                    <div class="form-group">
                        <label>Full Name</label>
                        <p id="profileName" style="padding: 10px; background: #f9f9f9; border-radius: 4px;">Loading...</p>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <p id="profileEmail" style="padding: 10px; background: #f9f9f9; border-radius: 4px;">Loading...</p>
                    </div>
                    <div class="form-group">
                        <label>Role</label>
                        <p id="profileRole" style="padding: 10px; background: #f9f9f9; border-radius: 4px;">Loading...</p>
                    </div>
                    <div class="form-group">
                        <label>Member Since</label>
                        <p id="profileCreated" style="padding: 10px; background: #f9f9f9; border-radius: 4px;">Loading...</p>
                    </div>
                </div>

                <!-- Stats -->
                <div class="card-header" style="margin-top: 20px;">
                    <h3>My Statistics</h3>
                </div>
                <div class="stats-grid" style="grid-template-columns: repeat(3, 1fr);">
                    <div class="stat-card">
                        <div class="stat-number" id="statTotal">0</div>
                        <div class="stat-label">Total Tasks</div>
                    </div>
                    <div class="stat-card completed">
                        <div class="stat-number" id="statCompleted">0</div>
                        <div class="stat-label">Completed</div>
                    </div>
                    <div class="stat-card pending">
                        <div class="stat-number" id="statPending">0</div>
                        <div class="stat-label">In Progress</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/profile.js"></script>
</body>
</html>
