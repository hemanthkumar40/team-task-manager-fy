<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Task - Team Task Manager</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- Navbar will be inserted by JS -->
    <nav class="navbar" id="navbar"></nav>

    <!-- Main Content -->
    <div class="container">
        <div class="login-container" style="max-width: 600px;">
            <div class="card">
                <div class="card-header">
                    <h2>Create New Task</h2>
                </div>

                <!-- Alert -->
                <div id="alertBox" class="alert" style="display: none;"></div>

                <form id="createTaskForm">
                    <div class="form-group">
                        <label for="taskTitle">Task Title *</label>
                        <input type="text" id="taskTitle" name="taskTitle" placeholder="Enter task title" required>
                    </div>

                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea id="description" name="description" placeholder="Enter task description"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="projectId">Project *</label>
                        <select id="projectId" name="projectId" required>
                            <option value="">-- Select Project --</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="assignedTo">Assign To</label>
                        <select id="assignedTo" name="assignedTo">
                            <option value="">-- Select Member --</option>
                        </select>
                    </div>

                    <div class="grid-2">
                        <div class="form-group">
                            <label for="dueDate">Due Date</label>
                            <input type="date" id="dueDate" name="dueDate">
                        </div>
                        <div class="form-group">
                            <label for="priority">Priority</label>
                            <select id="priority" name="priority">
                                <option value="medium">Medium</option>
                                <option value="low">Low</option>
                                <option value="high">High</option>
                            </select>
                        </div>
                    </div>

                    <div style="display: flex; gap: 10px;">
                        <button type="submit" class="btn btn-primary">Create Task</button>
                        <a href="tasks.html" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/create-task.js"></script>
</body>
</html>
