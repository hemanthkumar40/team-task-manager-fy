<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks - Team Task Manager</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- Navbar will be inserted by JS -->
    <nav class="navbar" id="navbar"></nav>

    <!-- Main Content -->
    <div class="container">
        <div class="section-header">
            <div>
                <h1>Tasks</h1>
                <p>View and manage tasks</p>
            </div>
            <a href="create-task.html" class="btn btn-primary" id="createTaskBtn" style="display:none;">Create Task</a>
        </div>

        <!-- Filter/Search -->
        <div class="card" style="margin-bottom: 20px;">
            <div style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap;">
                <div class="form-group" style="margin-bottom: 0; flex: 1;">
                    <input type="text" id="searchInput" placeholder="Search tasks...">
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <select id="statusFilter">
                        <option value="">All Statuses</option>
                        <option value="not_started">Not Started</option>
                        <option value="in_progress">In Progress</option>
                        <option value="pending_review">Pending Review</option>
                        <option value="verified_completed">Verified Completed</option>
                        <option value="needs_rework">Needs Rework</option>
                        <option value="overdue">Overdue</option>
                    </select>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <select id="priorityFilter">
                        <option value="">All Priorities</option>
                        <option value="high">High</option>
                        <option value="medium">Medium</option>
                        <option value="low">Low</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Tasks List -->
        <div id="tasksList">
            <div class="loading">Loading tasks...</div>
        </div>
    </div>

    <!-- Task Detail Modal -->
    <div class="modal" id="taskModal">
        <div class="modal-content" style="max-width: 700px;">
            <div class="modal-header">
                <h3 id="modalTaskTitle">Task Details</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div id="taskModalContent">
                <div class="loading">Loading...</div>
            </div>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/tasks.js"></script>
</body>
</html>
